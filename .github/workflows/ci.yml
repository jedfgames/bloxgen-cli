name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  branch-naming:
    name: Validate branch name
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name format
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Checking branch name: $BRANCH"

          if [[ ! "$BRANCH" =~ ^(feature|bugfix|hotfix|chore|docs|refactor|test)/ ]]; then
            echo "::error::Branch name must start with a valid prefix (feature/, bugfix/, hotfix/, chore/, docs/, refactor/, test/)"
            exit 1
          fi

          SUFFIX="${BRANCH#*/}"
          if [[ ! "$SUFFIX" =~ ^[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
            echo "::error::Branch name after prefix must be lowercase kebab-case (e.g., feature/my-new-feature)"
            exit 1
          fi

          echo "Branch name is valid."

  format:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Check formatting
        run: bun run format:check

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck

  build:
    name: Build binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun build Source/Cli.ts --compile --outfile Build/bloxgen

      - name: Verify binary runs
        run: ./Build/bloxgen version

  version-match:
    name: Check version match
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check VERSION matches package.json
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")

          if [ "$FILE_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::VERSION file ($FILE_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi

          echo "Versions match: $FILE_VERSION"
