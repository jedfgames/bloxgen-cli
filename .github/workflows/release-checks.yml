name: Release checks

on:
  pull_request:
    branches:
      - release

jobs:
  pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "Checking PR title: $TITLE"

          if [[ ! "$TITLE" =~ ^Release\ [0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::PR title must be exactly 'Release X.Y.Z' (e.g., 'Release 1.2.3')"
            exit 1
          fi

          echo "PR title is valid."

  diff-check:
    name: Verify diff matches main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check diff with main
        run: |
          git fetch origin main

          DIFF=$(git diff origin/main..HEAD)

          if [ -n "$DIFF" ]; then
            echo "::error::PR branch has changes that differ from main. The release branch must contain exactly what is in main."
            echo "Diff:"
            echo "$DIFF"
            exit 1
          fi

          echo "PR branch matches main exactly."

  format:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Check formatting
        run: bun run format:check

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck

  build:
    name: Build binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun build Source/Cli.ts --compile --outfile Build/bloxgen

      - name: Verify binary runs
        run: ./Build/bloxgen version

  version:
    name: Validate version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bump
        run: |
          git fetch origin release 2>/dev/null || true

          CURRENT=$(cat VERSION | tr -d '[:space:]')

          if git rev-parse origin/release >/dev/null 2>&1; then
            PREVIOUS=$(git show origin/release:VERSION 2>/dev/null | tr -d '[:space:]' || echo "0.0.0")
          else
            PREVIOUS="0.0.0"
          fi

          if [ "$CURRENT" = "$PREVIOUS" ]; then
            echo "::error::VERSION has not been bumped (still $CURRENT)"
            exit 1
          fi

          echo "Version bumped from $PREVIOUS to $CURRENT"

      - name: Check VERSION matches package.json
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")

          if [ "$FILE_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::VERSION file ($FILE_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi

          echo "Versions match: $FILE_VERSION"

      - name: Check changelog entry
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')

          if ! grep -q "^## $VERSION" CHANGELOG.md; then
            echo "::error::No changelog entry found for version $VERSION"
            exit 1
          fi

          echo "Changelog entry found for $VERSION"

      - name: Verify PR title matches VERSION
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          EXPECTED_TITLE="Release $VERSION"
          ACTUAL_TITLE="${{ github.event.pull_request.title }}"

          if [ "$EXPECTED_TITLE" != "$ACTUAL_TITLE" ]; then
            echo "::error::PR title '$ACTUAL_TITLE' does not match VERSION file. Expected '$EXPECTED_TITLE'"
            exit 1
          fi

          echo "PR title matches VERSION file."
